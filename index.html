<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anwlito Web</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  font-family: Arial, sans-serif;
  background:black;
}

/* 🌅 FONDO */
#fondo{
  position:fixed;
  width:100vw;
  height:100vh;
  object-fit:cover;
  z-index:0;
}

/* 🌈 EFECTO SHADER SUAVE */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at center, rgba(0,255,200,0.10), transparent 60%),
    linear-gradient(120deg, rgba(255,0,150,0.05), rgba(0,0,0,0));
  mix-blend-mode:screen;
  pointer-events:none;
  z-index:1;
}

/* ✍️ NAMES */
#names{
  position:absolute;
  top:10%;
  left:50%;
  transform:translateX(-50%);
  width:45vw;
  max-width:700px;
  z-index:3;
}

/* 👤 ICONO */
#icono{
  position:absolute;
  right:0;
  bottom:0;
  height:90vh;
  z-index:2;
}

/* 🔗 BOTONES (MENÚ PRINCIPAL GRANDE) */
.botones{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;
  gap:8vw;

  z-index:5;
}

/* 🎮 ICONOS GRANDES */
.botones img{
  height:22vh;
  width:auto;

  cursor:pointer;
  transition: transform 0.25s ease, filter 0.25s ease;

  filter: drop-shadow(0 0 10px rgba(0,255,200,0.5));
}

/* ✨ hover estilo juego */
.botones img:hover{
  transform:scale(1.25) rotate(-2deg);
  filter: drop-shadow(0 0 25px rgba(0,255,255,0.9));
}

</style>

</head>

<body>

<!-- 🎵 MUSICA -->
<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
window.addEventListener("click", () => {
  document.getElementById("bgm").play();
}, { once:true });
</script>

<!-- 🌅 FONDO -->
<img src="fondo.png" id="fondo">

<!-- ✍️ NAMES -->
<img src="names.png" id="names">

<!-- 👤 PERSONAJE -->
<img src="anwlitoicon.png" id="icono">

<!-- 🔗 BOTONES -->
<div class="botones">

  <a href="https://gamebanana.com/members/4193340" target="_blank">
    <img src="gamebanana.png">
  </a>

  <a href="https://anwlitoc.carrd.co/" target="_blank">
    <img src="yt.png">
  </a>

  <a href="https://www.tiktok.com/@eliot_friend_anwlito?lang=es-419" target="_blank">
    <img src="tiktok.png">
  </a>

</div>

</body>
</html>
