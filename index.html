<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anwlito Web</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  font-family: Arial, sans-serif;
}

/* 🌅 FONDO */
#fondo{
  position:fixed;
  width:100vw;
  height:100vh;
  object-fit:cover;
  z-index:0;
}

/* 🌈 SHADER / EFECTO VISUAL */
body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 50% 50%, rgba(0,255,200,0.10), transparent 60%),
    linear-gradient(120deg, rgba(255,0,150,0.05), rgba(0,0,0,0));
  mix-blend-mode:screen;
  z-index:1;
  pointer-events:none;
  animation:moveGlow 6s infinite alternate;
}

@keyframes moveGlow{
  0%{
    filter:hue-rotate(0deg) contrast(1.1);
    transform:scale(1);
  }
  100%{
    filter:hue-rotate(25deg) contrast(1.3);
    transform:scale(1.02);
  }
}

body::after{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:repeating-linear-gradient(
    0deg,
    rgba(255,255,255,0.02),
    rgba(255,255,255,0.02) 1px,
    transparent 2px,
    transparent 4px
  );
  opacity:0.25;
  z-index:2;
  pointer-events:none;
}

/* ✍️ NAMES */
#names{
  position:absolute;
  top:12%;
  left:50%;
  transform:translateX(-50%);
  width:45vw;
  max-width:700px;
  z-index:4;
}

/* 👤 ICONO */
#icono{
  position:absolute;
  right:0;
  bottom:0;
  height:95vh;
  z-index:3;
}

/* 🔗 BOTONES */
.botones{
  position:absolute;
  top:28%;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:60px;
  z-index:5;
}

/* 🎮 ICONOS PRO (HUD STYLE) */
.botones img{
  width:8vh;
  max-width:100px;
  min-width:50px;
  cursor:pointer;

  transition: transform 0.25s ease, filter 0.25s ease;

  filter: drop-shadow(0 0 6px rgba(0,255,200,0.4));

  animation: breathe 3s infinite ease-in-out;
}

@keyframes breathe{
  0%{
    transform:scale(1);
    filter: drop-shadow(0 0 6px rgba(0,255,200,0.4));
  }
  50%{
    transform:scale(1.05);
    filter: drop-shadow(0 0 12px rgba(255,0,200,0.5));
  }
  100%{
    transform:scale(1);
    filter: drop-shadow(0 0 6px rgba(0,255,200,0.4));
  }
}

.botones img:hover{
  transform:scale(1.25) rotate(-2deg);
  filter: drop-shadow(0 0 18px rgba(0,255,255,0.9));
}

</style>

</head>

<body>

<img src="fondo.png" id="fondo">

<img src="names.png" id="names">

<img src="anwlitoicon.png" id="icono">

<div class="botones">

  <a href="https://gamebanana.com/members/4193340" target="_blank">
    <img src="gamebanana.png">
  </a>

  <a href="https://anwlitoc.carrd.co/" target="_blank">
    <img src="yt.png">
  </a>

  <a href="https://www.tiktok.com/@eliot_friend_anwlito?lang=es-419" target="_blank">
    <img src="tiktok.png">
  </a>

</div>

</body>
</html>
