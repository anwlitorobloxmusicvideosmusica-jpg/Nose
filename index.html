<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anwlito Web</title>

<style>

@font-face {
  font-family: "AnwFont";
  src: url("fuente.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  background:black;
  font-family: Arial;
}

/* 🌅 FONDO */
#fondo{
  position:fixed;
  width:100vw;
  height:100vh;
  object-fit:cover;
  z-index:0;
  opacity:0;
  transition:1s;
}

/* 👤 PERSONAJE */
#icono{
  position:absolute;
  right:0;
  bottom:0;
  height:90vh;
  z-index:2;
  opacity:0;
  transition:1s;
}

/* 🔗 BOTONES */
.botones{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;
  gap:6vw;

  z-index:5;

  opacity:0;
  transform:scale(0.9);
  transition:1s;
}

.botones img{
  height:20vh;
  cursor:pointer;
  transition:0.25s;
  filter: drop-shadow(0 0 10px rgba(0,255,200,0.5));
}

.botones img:hover{
  transform:scale(1.25);
}

/* 🎮 START SCREEN */
#startScreen{
  position:fixed;
  inset:0;
  background:black;
  z-index:10;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.startBox{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

.startText{
  color:red;
  font-family:"AnwFont";
  font-size:2.5vh;
  animation:blink 1.2s infinite;
  text-align:center;
}

@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}

/* 🌈 SHADER */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 30% 30%, rgba(0,255,200,0.12), transparent 60%),
    radial-gradient(circle at 70% 70%, rgba(255,0,150,0.08), transparent 60%);
  animation:shaderMove 6s infinite alternate;
  mix-blend-mode:screen;
  pointer-events:none;
  z-index:1;
}

@keyframes shaderMove{
  0%{transform:scale(1);}
  100%{transform:scale(1.1) translate(10px,-10px);}
}

/* 💥 GLITCH */
.glitch{
  animation:glitch 0.3s infinite;
}

@keyframes glitch{
  0%{transform:translate(0,0);}
  25%{transform:translate(2px,-2px);}
  50%{transform:translate(-2px,2px);}
  75%{transform:translate(2px,2px);}
  100%{transform:translate(0,0);}
}

/* ✨ PARTICULAS */
.particle{
  position:fixed;
  width:4px;
  height:4px;
  background:white;
  border-radius:50%;
  z-index:1;
  animation:float 6s linear infinite;
}

@keyframes float{
  from{transform:translateY(100vh);opacity:0;}
  to{transform:translateY(-10vh);opacity:1;}
}

/* 📱 ORIENTACIÓN BLOQUEO */
#rotateScreen{
  position:fixed;
  inset:0;
  background:black;
  color:white;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.rotateBox{
  text-align:center;
  font-size:3vh;
  animation:floatPhone 1.2s infinite;
  font-family:"AnwFont";
}

.rotateBox::before{
  content:"📱";
  font-size:8vh;
  display:block;
  animation:spinPhone 1.5s infinite;
  margin-bottom:20px;
}

@keyframes spinPhone{
  0%{transform:rotate(0deg);}
  50%{transform:rotate(90deg);}
  100%{transform:rotate(0deg);}
}

@keyframes floatPhone{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

</style>

</head>

<body>

<!-- 📱 ORIENTACIÓN -->
<div id="rotateScreen">
  <div class="rotateBox">
    GIRA TU DISPOSITIVO
  </div>
</div>

<!-- 🎵 MUSICA -->
<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- 🎮 START -->
<div id="startScreen">
  <div class="startBox glitch">
    <img src="start.png">
    <p class="startText">PRESIONA LA PANTALLA PARA EMPEZAR</p>
  </div>
</div>

<!-- 🌅 FONDO -->
<img src="fondo.png" id="fondo">

<!-- 👤 PERSONAJE -->
<img src="anwlitoicon.png" id="icono">

<!-- 🔗 BOTONES -->
<div class="botones">

  <a href="https://gamebanana.com/members/4193340"><img src="gamebanana2.png"></a>
  <a href="https://anwlitoc.carrd.co/"><img src="yt2.png"></a>
  <a href="https://www.tiktok.com/@eliot_friend_anwlito"><img src="tiktok2.png"></a>
  <a href="https://x.com/SoyAnwlitoyt"><img src="Twitter.png"></a>
  <a href="https://discord.gg/YBnPcpTxqF"><img src="Discord.png"></a>

</div>

<script>

/* 🎮 START */
document.addEventListener("DOMContentLoaded", () => {

  const start = document.getElementById("startScreen");
  const music = document.getElementById("bgm");

  start.addEventListener("click", () => {

    start.style.display = "none";

    music.play().catch(()=>{});

    document.getElementById("fondo").style.opacity = "1";
    document.getElementById("icono").style.opacity = "1";
    document.querySelector(".botones").style.opacity = "1";

    startParticles();
  });

});

/* ✨ PARTICULAS */
function startParticles(){
  for(let i=0;i<25;i++){
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random()*100 + "vw";
    p.style.animationDuration = (3+Math.random()*5)+"s";
    document.body.appendChild(p);
  }
}

/* 📱 ORIENTACIÓN */
function checkOrientation(){
  const r = document.getElementById("rotateScreen");

  if(window.innerHeight > window.innerWidth){
    r.style.display = "flex";
  } else {
    r.style.display = "none";
  }
}

window.addEventListener("resize", checkOrientation);
window.addEventListener("load", checkOrientation);

</script>

</body>
</html>
