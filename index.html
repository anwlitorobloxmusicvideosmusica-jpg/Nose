<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anwlito Web</title>

<style>

/* 🎨 FUENTE PERSONALIZADA */
@font-face {
  font-family: "AnwFont";
  src: url("fuente.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  font-family: Arial;
  background:black;
}

/* 🌅 FONDO */
#fondo{
  position:fixed;
  width:100vw;
  height:100vh;
  object-fit:cover;
  z-index:0;
  opacity:0;
  transition:1s;
}

/* 👤 PERSONAJE */
#icono{
  position:absolute;
  right:0;
  bottom:0;
  height:90vh;
  z-index:2;
  opacity:0;
  transition:1s;
}

/* 🔗 BOTONES */
.botones{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;
  gap:6vw;

  z-index:5;

  opacity:0;
  transform:scale(0.9);
  transition:1s;
}

/* 🎮 ICONOS */
.botones img{
  height:20vh;
  width:auto;

  cursor:pointer;
  transition:0.25s ease;

  filter: drop-shadow(0 0 10px rgba(0,255,200,0.5));
}

.botones img:hover{
  transform:scale(1.25);
  filter: drop-shadow(0 0 25px rgba(0,255,255,0.9));
}

/* 🎮 START SCREEN */
#startScreen{
  position:fixed;
  width:100%;
  height:100%;
  background:black;

  display:flex;
  justify-content:center;
  align-items:center;

  z-index:10;
  cursor:pointer;
}

.startBox{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

.startText{
  color:red;
  font-size:2.5vh;
  letter-spacing:3px;

  font-family:"AnwFont";

  animation:blink 1.2s infinite;
  text-align:center;
}

/* 🔴 blink efecto */
@keyframes blink{
  0%{ opacity:1; }
  50%{ opacity:0.3; }
  100%{ opacity:1; }
}

/* 🌈 SHADER */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at center, rgba(0,255,200,0.10), transparent 60%),
    linear-gradient(120deg, rgba(255,0,150,0.05), rgba(0,0,0,0));
  mix-blend-mode:screen;
  pointer-events:none;
  z-index:1;
}

</style>

</head>

<body>

<!-- 🎵 MUSICA -->
<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- 🎮 START SCREEN -->
<div id="startScreen">
  <div class="startBox">
    <img src="start.png">
    <p class="startText">PRESIONA LA PANTALLA PARA EMPEZAR</p>
  </div>
</div>

<!-- 🌅 FONDO -->
<img src="fondo.png" id="fondo">

<!-- 👤 PERSONAJE -->
<img src="anwlitoicon.png" id="icono">

<!-- 🔗 BOTONES -->
<div class="botones">

  <a href="https://gamebanana.com/members/4193340" target="_blank">
    <img src="gamebanana2.png">
  </a>

  <a href="https://anwlitoc.carrd.co/" target="_blank">
    <img src="yt2.png">
  </a>

  <a href="https://www.tiktok.com/@eliot_friend_anwlito?lang=es-419" target="_blank">
    <img src="tiktok2.png">
  </a>

  <a href="https://x.com/SoyAnwlitoyt" target="_blank">
    <img src="twitter.png">
  </a>

  <a href="https://discord.gg/YBnPcpTxqF" target="_blank">
    <img src="discord.png">
  </a>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  const start = document.getElementById("startScreen");
  const music = document.getElementById("bgm");

  start.addEventListener("click", () => {

    start.style.display = "none";

    music.play().catch(()=>{});

    document.getElementById("fondo").style.opacity = "1";
    document.getElementById("icono").style.opacity = "1";
    document.querySelector(".botones").style.opacity = "1";
  });

});
</script>

</body>
</html>
