<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anwlito Web</title>

<style>

@font-face {
  font-family: "AnwFont";
  src: url("fuente.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  background:black;
  font-family: Arial;
}

/* 🌅 FONDO */
#fondo{
  position:fixed;
  width:100vw;
  height:100vh;
  object-fit:cover;
  z-index:0;
  opacity:0;
  transition:1s;
}

/* 👤 PERSONAJE */
#icono{
  position:absolute;
  right:0;
  bottom:0;
  height:90vh;
  z-index:2;
  opacity:0;
  transition:1s;
}

/* 🔗 BOTONES PRINCIPALES */
.botones{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;
  gap:6vw;

  z-index:5;

  opacity:0;
  transition:1s;
}

.botones img{
  height:20vh;
  cursor:pointer;
  transition:0.25s;
}

.botones img:hover{
  transform:scale(1.2);
}

/* 🎮 START SCREEN */
#startScreen{
  position:fixed;
  inset:0;
  background:black;
  z-index:10;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.startText{
  color:red;
  font-family:"AnwFont";
  font-size:2.5vh;
  animation:blink 1.2s infinite;
  text-align:center;
}

@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}

/* 📱 ORIENTACIÓN */
#rotateScreen{
  position:fixed;
  inset:0;
  background:black;
  color:white;
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.rotateBox::before{
  content:"📱";
  font-size:8vh;
  display:block;
  animation:spin 1.5s infinite;
  margin-bottom:20px;
}

.rotateBox{
  text-align:center;
  font-family:"AnwFont";
  animation:float 1.2s infinite;
}

@keyframes spin{
  0%{transform:rotate(0);}
  50%{transform:rotate(90deg);}
  100%{transform:rotate(0);}
}

@keyframes float{
  0%{transform:translateY(0);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0);}
}

/* 🌌 SHADER */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 30% 30%, rgba(0,255,200,0.12), transparent 60%),
    radial-gradient(circle at 70% 70%, rgba(255,0,150,0.08), transparent 60%);
  mix-blend-mode:screen;
  pointer-events:none;
  z-index:1;
}

</style>
</head>

<body>

<!-- 📱 ORIENTACIÓN -->
<div id="rotateScreen">
  <div class="rotateBox">GIRA TU DISPOSITIVO</div>
</div>

<!-- 🎮 START -->
<div id="startScreen">
  <p class="startText">PRESIONA LA PANTALLA PARA EMPEZAR</p>
</div>

<!-- 🎵 MUSICA -->
<audio id="bgm" loop>
  <source src="music.mp3">
</audio>

<!-- 🌅 FONDO -->
<img id="fondo" src="fondo.png">

<!-- 👤 PERSONAJE -->
<img id="icono" src="anwlitoicon.png">

<!-- 🔗 MENÚ -->
<div class="botones">

  <img src="gamebanana2.png" onclick="openVideos()">
  <img src="yt2.png">
  <img src="tiktok2.png">

</div>

<!-- 🎬 SECCIÓN VIDEOS (NETFLIX) -->
<div id="videosPage" style="display:none;"></div>
<script>

/* 🎮 START SYSTEM */
document.getElementById("startScreen").addEventListener("click", () => {

  document.getElementById("startScreen").style.display = "none";

  document.getElementById("fondo").style.opacity = "1";
  document.getElementById("icono").style.opacity = "1";
  document.querySelector(".botones").style.opacity = "1";

  document.getElementById("bgm").play().catch(()=>{});

  startParticles();
});

/* 📱 ORIENTACIÓN */
function checkOrientation(){
  const r = document.getElementById("rotateScreen");

  if(window.innerHeight > window.innerWidth){
    r.style.display = "flex";
  }else{
    r.style.display = "none";
  }
}

window.addEventListener("resize", checkOrientation);
window.addEventListener("load", checkOrientation);

/* ✨ PARTÍCULAS */
function startParticles(){
  for(let i=0;i<20;i++){
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random()*100 + "vw";
    p.style.animationDuration = (3+Math.random()*5)+"s";
    document.body.appendChild(p);
  }
}

/* 🎬 SISTEMA NETFLIX DE VIDEOS */
const videos = {
  principal: "",
  among: "",
  roblox: "",
  tiktok: ""
};

/* 🔥 ABRIR PÁGINA VIDEOS */
function openVideos(){
  document.querySelector(".botones").style.display = "none";

  let page = document.getElementById("videosPage");
  page.style.display = "block";

  page.innerHTML = `
    <div style="color:white;text-align:center;padding:20px;font-family:Arial">

      <h1 style="color:cyan;">MIS VIDEOS</h1>

      ${createVideo("CANAL PRINCIPAL", videos.principal, "red")}
      ${createVideo("CANAL AMONG US", videos.among, "yellow")}
      ${createVideo("ROBLOX", videos.roblox, "lime")}
      ${createVideo("TIKTOK", videos.tiktok, "violet")}

      <br><br>
      <button onclick="closeVideos()" style="padding:10px 20px;font-size:18px;">
        VOLVER
      </button>

    </div>
  `;
}

/* 🎬 CREAR BLOQUE DE VIDEO */
function createVideo(title, url, color){

  if(!url){
    return `<p style="color:${color};font-size:18px;">
      ${title}: <br>
      ❌ No hay vídeos en los últimos 8 meses
    </p><br>`;
  }

  const id = getYouTubeID(url);
  const thumb = `https://img.youtube.com/vi/${id}/maxresdefault.jpg`;

  return `
    <div style="margin:20px;">
      <h2 style="color:${color}">${title}</h2>
      <a href="${url}" target="_blank">
        <img src="${thumb}" style="width:60%;border-radius:10px;">
      </a>
    </div>
  `;
}

/* 🔗 SACAR ID DE YOUTUBE */
function getYouTubeID(url){
  let match = url.match(/v=([^&]+)/);
  if(match) return match[1];

  match = url.match(/youtu\.be\/([^?]+)/);
  if(match) return match[1];

  return "";
}

/* 🔙 CERRAR */
function closeVideos(){
  document.getElementById("videosPage").style.display = "none";
  document.querySelector(".botones").style.display = "flex";
}

</script>

</body>
</html>
