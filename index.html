<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anwlito Web</title>

<style>

/* 🎨 FUENTE */
@font-face {
  font-family: "AnwFont";
  src: url("fuente.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  background:black;
  font-family: Arial;
}

/* 🌅 FONDO */
#fondo{
  position:fixed;
  width:100vw;
  height:100vh;
  object-fit:cover;
  z-index:0;
  opacity:0;
  transition:1s;
}

/* 👤 PERSONAJE */
#icono{
  position:absolute;
  right:0;
  bottom:0;
  height:90vh;
  z-index:2;
  opacity:0;
  transition:1s;
}

/* 🔗 BOTONES */
.botones{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;
  gap:6vw;

  z-index:5;

  opacity:0;
  transform:scale(0.9);
  transition:1s;
}

.botones img{
  height:20vh;
  width:auto;
  cursor:pointer;

  transition:0.2s;
  filter: drop-shadow(0 0 10px rgba(0,255,200,0.5));
}

.botones img:hover{
  transform:scale(1.25);
  filter: drop-shadow(0 0 25px rgba(0,255,255,0.9));
}

/* 🎮 START SCREEN */
#startScreen{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  z-index:10;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

.startBox{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:20px;
}

.startText{
  color:red;
  font-size:2.5vh;
  font-family:"AnwFont";
  letter-spacing:3px;
  animation:blink 1.2s infinite;
  text-align:center;
}

@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}

/* 🌈 SHADER ANIMADO */
body::before{
  content:"";
  position:fixed;
  inset:0;
  z-index:1;
  pointer-events:none;

  background:
    radial-gradient(circle at 30% 30%, rgba(0,255,200,0.12), transparent 60%),
    radial-gradient(circle at 70% 70%, rgba(255,0,150,0.08), transparent 60%);

  animation:shaderMove 6s infinite alternate;
  mix-blend-mode:screen;
}

@keyframes shaderMove{
  0%{ transform:scale(1) translate(0px,0px); }
  100%{ transform:scale(1.1) translate(10px,-10px); }
}

/* 💥 GLITCH SUAVE */
.glitch{
  animation:glitch 0.3s infinite;
}

@keyframes glitch{
  0%{ transform:translate(0,0); }
  20%{ transform:translate(2px,-2px); }
  40%{ transform:translate(-2px,2px); }
  60%{ transform:translate(2px,2px); }
  80%{ transform:translate(-2px,-1px); }
  100%{ transform:translate(0,0); }
}

/* ✨ PARTICULAS */
.particle{
  position:fixed;
  width:4px;
  height:4px;
  background:white;
  border-radius:50%;
  opacity:0.6;
  z-index:1;
  pointer-events:none;
  animation:float 6s linear infinite;
}

@keyframes float{
  from{ transform:translateY(100vh); opacity:0; }
  to{ transform:translateY(-10vh); opacity:1; }
}

</style>

</head>

<body>

<!-- 🎵 MUSICA -->
<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- 🎮 START -->
<div id="startScreen">
  <div class="startBox glitch">
    <img src="start.png">
    <p class="startText">PRESIONA LA PANTALLA PARA EMPEZAR</p>
  </div>
</div>

<!-- 🌅 FONDO -->
<img src="fondo.png" id="fondo">

<!-- 👤 PERSONAJE -->
<img src="anwlitoicon.png" id="icono">

<!-- 🔗 BOTONES -->
<div class="botones">

  <a href="https://gamebanana.com/members/4193340" target="_blank">
    <img src="gamebanana2.png">
  </a>

  <a href="https://anwlitoc.carrd.co/" target="_blank">
    <img src="yt2.png">
  </a>

  <a href="https://www.tiktok.com/@eliot_friend_anwlito?lang=es-419" target="_blank">
    <img src="tiktok2.png">
  </a>

  <a href="https://x.com/SoyAnwlitoyt" target="_blank">
    <img src="Twitter.png">
  </a>

  <a href="https://discord.gg/YBnPcpTxqF" target="_blank">
    <img src="Discord.png">
  </a>

</div>

<script>
/* 🎮 START SYSTEM */
document.addEventListener("DOMContentLoaded", () => {

  const start = document.getElementById("startScreen");
  const music = document.getElementById("bgm");

  start.addEventListener("click", () => {

    start.style.display = "none";

    music.play().catch(()=>{});

    document.getElementById("fondo").style.opacity = "1";
    document.getElementById("icono").style.opacity = "1";
    document.querySelector(".botones").style.opacity = "1";

    startParticles();
  });

});

/* ✨ PARTÍCULAS */
function startParticles(){
  for(let i=0;i<25;i++){
    let p = document.createElement("div");
    p.className = "particle";
    p.style.left = Math.random()*100 + "vw";
    p.style.animationDuration = (3+Math.random()*5) + "s";
    document.body.appendChild(p);
  }
}
</script>

</body>
</html>
