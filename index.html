<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anwlito Web</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  font-family: Arial;
  background:black;
}

/* 🌅 FONDO */
#fondo{
  position:fixed;
  width:100vw;
  height:100vh;
  object-fit:cover;
  z-index:0;
  opacity:0;
  transition:1s;
}

/* 👤 PERSONAJE */
#icono{
  position:absolute;
  right:0;
  bottom:0;
  height:90vh;
  z-index:2;
  opacity:0;
  transition:1s;
}

/* 🔗 REDES */
.botones{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;
  gap:8vw;

  z-index:5;

  opacity:0;
  transform:scale(0.8);
  transition:1s;
}

.botones img{
  height:20vh;
  cursor:pointer;
  transition:0.25s;
  filter: drop-shadow(0 0 10px rgba(0,255,200,0.5));
}

.botones img:hover{
  transform:scale(1.2);
  filter: drop-shadow(0 0 25px rgba(0,255,255,0.9));
}

/* 🎮 START SCREEN */
#startScreen{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:10;
  cursor:pointer;
}

#startScreen img{
  width:40vw;
  max-width:600px;
  animation:pulse 1.5s infinite;
}

@keyframes pulse{
  0%{ transform:scale(1); opacity:1; }
  50%{ transform:scale(1.05); opacity:0.7; }
  100%{ transform:scale(1); opacity:1; }
}

/* ✨ ANIMACIÓN ENTRADA */
.show{
  opacity:1 !important;
  transform:scale(1) !important;
}
</style>

</head>

<body>

<!-- 🎵 MUSICA -->
<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- 🎮 START SCREEN -->
<div id="startScreen">
  <img src="start.png">
</div>

<!-- 🌅 FONDO -->
<img src="fondo.png" id="fondo">

<!-- 👤 PERSONAJE -->
<img src="anwlitoicon.png" id="icono">

<!-- 🔗 BOTONES -->
<div class="botones">

  <a href="https://gamebanana.com/members/4193340" target="_blank">
    <img src="gamebanana2.png">
  </a>

  <a href="https://anwlitoc.carrd.co/" target="_blank">
    <img src="yt2.png">
  </a>

  <a href="https://www.tiktok.com/@eliot_friend_anwlito?lang=es-419" target="_blank">
    <img src="tiktok2.png">
  </a>

</div>

<script>
const start = document.getElementById("startScreen");
const music = document.getElementById("bgm");

start.addEventListener("click", () => {

  // ocultar start
  start.style.opacity = "0";
  start.style.pointerEvents = "none";

  // activar música
  music.play();

  // mostrar todo con animación
  document.getElementById("fondo").classList.add("show");
  document.getElementById("icono").classList.add("show");
  document.querySelector(".botones").classList.add("show");

});
</script>

</body>
</html>
