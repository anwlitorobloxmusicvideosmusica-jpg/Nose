<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anwlito Web</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  font-family: Arial, sans-serif;
  background:black;
}

/* 🌅 FONDO */
#fondo{
  position:fixed;
  width:100vw;
  height:100vh;
  object-fit:cover;
  z-index:0;
}

/* 🌈 SHADER SUAVE */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 50% 50%, rgba(0,255,200,0.10), transparent 60%),
    linear-gradient(120deg, rgba(255,0,150,0.05), rgba(0,0,0,0));
  mix-blend-mode:screen;
  pointer-events:none;
  z-index:1;
}

/* ✍️ NAMES */
#names{
  position:absolute;
  top:10%;
  left:50%;
  transform:translateX(-50%);
  width:45vw;
  max-width:700px;
  z-index:3;
}

/* 👤 ICONO */
#icono{
  position:absolute;
  right:0;
  bottom:0;
  height:90vh;
  z-index:2;
}

/* 🔗 BOTONES */
.botones{
  position:absolute;
  top:30%;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:50px;
  z-index:4;
}

/* 🎮 ICONOS */
.botones img{
  width:70px;
  transition:0.2s;
  cursor:pointer;
  filter: drop-shadow(0 0 6px rgba(0,255,200,0.4));
}

.botones img:hover{
  transform:scale(1.25);
  filter: drop-shadow(0 0 15px rgba(0,255,255,0.8));
}
</style>

</head>

<body>

<!-- 🎵 MUSICA (se activa al click) -->
<audio id="bgm" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
window.addEventListener("click", () => {
  document.getElementById("bgm").play();
}, { once:true });
</script>

<!-- 🌅 FONDO -->
<img src="fondo.png" id="fondo">

<!-- ✍️ NOMBRE -->
<img src="names.png" id="names">

<!-- 👤 PERSONAJE -->
<img src="anwlitoicon.png" id="icono">

<!-- 🔗 ICONOS -->
<div class="botones">

  <a href="https://gamebanana.com/members/4193340" target="_blank">
    <img src="gamebanana.png">
  </a>

  <a href="https://anwlitoc.carrd.co/" target="_blank">
    <img src="yt.png">
  </a>

  <a href="https://www.tiktok.com/@eliot_friend_anwlito?lang=es-419" target="_blank">
    <img src="tiktok.png">
  </a>

</div>

</body>
</html>
