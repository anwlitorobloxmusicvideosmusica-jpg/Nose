<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anwlito Web</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  font-family: Arial, sans-serif;
  background:black;
}

/* 🌅 FONDO */
#fondo{
  position:fixed;
  width:100vw;
  height:100vh;
  object-fit:cover;
  z-index:0;
}

/* 🌈 SHADER SUAVE */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at center, rgba(0,255,200,0.10), transparent 60%),
    linear-gradient(120deg, rgba(255,0,150,0.05), rgba(0,0,0,0));
  mix-blend-mode:screen;
  pointer-events:none;
  z-index:1;
}

/* 👤 PERSONAJE */
#icono{
  position:absolute;
  right:0;
  bottom:0;
  height:90vh;
  z-index:2;
}

/* 🔗 BOTONES */
.botones{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100vh;

  display:flex;
  justify-content:center;
  align-items:center;
  gap:8vw;

  z-index:5;
}

/* 🎮 ICONOS */
.botones img{
  height:20vh;
  width:auto;

  cursor:pointer;
  transition: transform 0.25s ease, filter 0.25s ease;

  filter: drop-shadow(0 0 10px rgba(0,255,200,0.5));
}

.botones img:hover{
  transform:scale(1.25);
  filter: drop-shadow(0 0 25px rgba(0,255,255,0.9));
}
</style>

</head>

<body>

<!-- 🎵 MUSICA (AUTO PLAY REAL) -->
<audio id="bgm" loop autoplay>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
window.addEventListener("load", () => {
  const music = document.getElementById("bgm");

  // intenta reproducir apenas carga
  music.play().catch(() => {
    // fallback: si el navegador bloquea autoplay
    document.body.addEventListener("click", () => {
      music.play();
    }, { once:true });
  });
});
</script>

<!-- 🌅 FONDO -->
<img src="fondo.png" id="fondo">

<!-- 👤 PERSONAJE -->
<img src="anwlitoicon.png" id="icono">

<!-- 🔗 BOTONES -->
<div class="botones">

  <a href="https://gamebanana.com/members/4193340" target="_blank">
    <img src="gamebanana2.png">
  </a>

  <a href="https://anwlitoc.carrd.co/" target="_blank">
    <img src="yt2.png">
  </a>

  <a href="https://www.tiktok.com/@eliot_friend_anwlito?lang=es-419" target="_blank">
    <img src="tiktok2.png">
  </a>

</div>

</body>
</html>
