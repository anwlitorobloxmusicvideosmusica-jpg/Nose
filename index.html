<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anwlito Web</title>

<style>

@font-face{
  font-family:"AnwFont";
  src:url("fuente.ttf");
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  overflow:hidden;
  background:black;
  font-family:Arial;
}

/* 🌅 FONDO */
#fondo{
  position:fixed;
  width:100vw;
  height:100vh;
  object-fit:cover;
  opacity:0;
  transition:1s;
}

/* 👤 ICONO */
#icono{
  position:absolute;
  right:0;
  bottom:0;
  height:90vh;
  opacity:0;
  transition:1s;
}

/* 🔗 BOTONES */
.botones{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  gap:40px;
  flex-wrap:wrap;
  opacity:0;
  transition:1s;
}

.botones img{
  height:16vh;
  cursor:pointer;
  transition:0.2s;
}

.botones img:hover{
  transform:scale(1.2);
}

/* 📺 BOTÓN VIDEO */
.videoBtn{
  font-size:70px;
  cursor:pointer;
  filter:drop-shadow(0 0 10px cyan);
  transition:0.2s;
}

.videoBtn:hover{
  transform:scale(1.2);
}

/* 🎮 START */
#startScreen{
  position:fixed;
  inset:0;
  background:black;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:10;
  cursor:pointer;
}

#startScreen img{
  width:60%;
  max-width:400px;
}

.startText{
  color:red;
  font-family:"AnwFont";
  animation:blink 1.2s infinite;
}

@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}

/* 🌌 SHADER */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background:
    radial-gradient(circle at 30% 30%, rgba(0,255,200,0.15), transparent 60%),
    radial-gradient(circle at 70% 70%, rgba(255,0,150,0.10), transparent 60%);
  mix-blend-mode:screen;
  pointer-events:none;
}

</style>
</head>

<body>

<!-- 🎮 START -->
<div id="startScreen">
  <img src="start.png">
  <p class="startText">PRESIONA LA PANTALLA PARA EMPEZAR</p>
</div>

<!-- 🎵 MUSICA -->
<audio id="bgm" loop>
  <source src="music.mp3">
</audio>

<!-- 🌅 FONDO -->
<img id="fondo" src="fondo.png">

<!-- 👤 ICONO -->
<img id="icono" src="anwlitoicon.png">

<!-- 🔗 BOTONES -->
<div class="botones">

  <!-- 📺 BOTÓN DIRECTO -->
  <div class="videoBtn" onclick="openPlaylist()">📺</div>

  <a href="https://anwlitoc.carrd.co/" target="_blank">
    <img src="yt2.png">
  </a>

  <a href="https://www.tiktok.com/@eliot_friend_anwlito" target="_blank">
    <img src="tiktok2.png">
  </a>

  <a href="https://x.com/SoyAnwlitoyt" target="_blank">
    <img src="Twitter.png">
  </a>

  <a href="https://discord.gg/YBnPcpTxqF" target="_blank">
    <img src="Discord.png">
  </a>

</div>

<script>

/* 🎮 START */
document.getElementById("startScreen").onclick = () => {

  document.getElementById("startScreen").style.display="none";

  document.getElementById("fondo").style.opacity="1";
  document.getElementById("icono").style.opacity="1";
  document.querySelector(".botones").style.opacity="1";

  document.getElementById("bgm").play().catch(()=>{});
};

/* 📺 FIX REAL: ABRE EN MISMA PESTAÑA */
function openPlaylist(){
  location.href = "https://youtube.com/playlist?list=PLBb0DKDUmZDg&si=EIDTzMlS_kKOpae6";
}

</script>

</body>
      </html>
